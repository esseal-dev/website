<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000a33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000621;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa6220;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c4a;stop-opacity:1" />
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.045)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect width="1200" height="630" fill="url(#dotGrid)" />

  <!-- Top orange accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#orangeGrad)" />

  <!-- Left accent line -->
  <rect x="80" y="110" width="3" height="360" fill="#fa6220" opacity="0.5" />

  <!-- Decorative rings top-right -->
  <circle cx="1100" cy="80" r="220" fill="none" stroke="rgba(250,98,32,0.06)" stroke-width="1" />
  <circle cx="1100" cy="80" r="150" fill="none" stroke="rgba(250,98,32,0.05)" stroke-width="1" />
  <circle cx="1100" cy="80" r="80" fill="none" stroke="rgba(250,98,32,0.08)" stroke-width="1" />

  <!-- Stat boxes top-right -->
  <rect x="860" y="110" width="140" height="80" rx="8" fill="rgba(250,98,32,0.08)" stroke="rgba(250,98,32,0.2)" stroke-width="1" />
  <text x="930" y="148" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" fill="#fa6220" text-anchor="middle">2+</text>
  <text x="930" y="170" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.5">YRS AVG CLIENT</text>

  <rect x="1016" y="110" width="140" height="80" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="1086" y="148" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" fill="#f4f4f5" text-anchor="middle">5+</text>
  <text x="1086" y="170" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.5">YRS PER DEV</text>

  <!-- ESSEAL wordmark -->
  <text x="116" y="178" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="5" fill="#fa6220">ESSEAL</text>
  <circle cx="228" cy="172" r="2" fill="rgba(255,255,255,0.2)" />
  <text x="238" y="178" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">Senior-Led Software Engineering</text>

  <!-- Main headline -->
  <text x="116" y="278" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="700" fill="#f4f4f5" letter-spacing="-2">38 Projects. 7 Years.</text>
  <text x="116" y="358" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="700" letter-spacing="-2">
    <tspan fill="#f4f4f5">Zero </tspan><tspan fill="#fa6220">Excuses.</tspan>
  </text>

  <!-- Sub-line -->
  <text x="116" y="406" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="0.2">Every developer named. Every decision communicated. No junior handoffs.</text>

  <!-- Sector pills -->
  <rect x="116" y="436" width="130" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="181" y="455" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Construction</text>

  <rect x="258" y="436" width="118" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="317" y="455" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Healthcare</text>

  <rect x="388" y="436" width="104" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="440" y="455" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Logistics</text>

  <rect x="504" y="436" width="122" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="565" y="455" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">E-Commerce</text>

  <rect x="638" y="436" width="86" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="681" y="455" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Telecom</text>

  <!-- Bottom divider -->
  <rect x="116" y="508" width="968" height="1" fill="rgba(255,255,255,0.08)" />

  <!-- Bottom row -->
  <text x="116" y="544" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.3)" letter-spacing="0.3">esseal.co.uk</text>

  <!-- Company registration -->
  <text x="1084" y="544" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="end" letter-spacing="0.3">Registered in England &amp; Wales · No. 17026190</text>
</svg>
