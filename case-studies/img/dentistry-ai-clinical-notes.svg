  <text x="108" y="200" font-size="11" font-weight="700" fill="#475569">CHIEF COMPLAINT</text>
  <text x="108" y="220" font-size="13" fill="#0f172a">Patient attended for second and final session of root canal treatment on UL6.</text>
  <text x="108" y="237" font-size="13" fill="#0f172a">Reported mild discomfort since session 1 (14 Mar), settled with ibuprofen.</text>

  <text x="108" y="265" font-size="11" font-weight="700" fill="#475569">CLINICAL FINDINGS</text>
  <text x="108" y="285" font-size="13" fill="#0f172a">LA administered: Lignospan Special (2% lidocaine, 1:80,000 adrenaline) — 2 cartridges</text>
  <text x="108" y="302" font-size="13" fill="#0f172a">Rubber dam isolation applied. Previous dressing (Ledermix) removed.</text>
  <text x="108" y="319" font-size="13" fill="#0f172a">3 canals located: MB, DB, P. Working lengths confirmed on CBCT.</text>

  <text x="108" y="347" font-size="11" font-weight="700" fill="#475569">PROCEDURE</text>
  <text x="108" y="367" font-size="13" fill="#0f172a">Canals instrumented with ProTaper Gold rotary files to:</text>
  <text x="120" y="385" font-size="13" fill="#0f172a">·  MB: F3 (25/.08)  to 20mm working length</text>
  <text x="120" y="402" font-size="13" fill="#0f172a">·  DB: F2 (25/.06)  to 19mm working length</text>
  <text x="120" y="419" font-size="13" fill="#0f172a">·  P:   F3 (25/.08)  to 21mm working length</text>
  <text x="108" y="437" font-size="13" fill="#0f172a">Irrigation: 2.5% NaOCl, EDTA 17%, final rinse CHX 0.2%.</text>
  <text x="108" y="454" font-size="13" fill="#0f172a">Canals dried, GP obturated with AH Plus sealer — warm vertical condensation.</text>

