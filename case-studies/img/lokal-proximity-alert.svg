<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <clipPath id="la"><rect width="1280" height="720"/></clipPath>
    <clipPath id="lp1"><rect x="142" y="82" width="236" height="516" rx="26"/></clipPath>
    <clipPath id="lp2"><rect x="902" y="82" width="236" height="516" rx="26"/></clipPath>
    <radialGradient id="bg2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0600"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="alertGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5450a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5450a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="alertGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5450a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f5450a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#la)">

  <rect width="1280" height="720" fill="url(#bg2)"/>

  <!-- Center connection label -->
  <text x="640" y="300" font-size="13" fill="#444444" text-anchor="middle">USER APP</text>
  <line x1="400" y1="330" x2="530" y2="370" stroke="#f5450a" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  <text x="640" y="380" font-size="11" fill="#f5450a" text-anchor="middle" opacity="0.7">proximity</text>
  <text x="640" y="396" font-size="11" fill="#f5450a" text-anchor="middle" opacity="0.7">trigger</text>
  <text x="640" y="412" font-size="11" fill="#f5450a" text-anchor="middle" opacity="0.5">89m</text>
  <line x1="750" y1="370" x2="880" y2="330" stroke="#f5450a" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  <text x="640" y="445" font-size="13" fill="#444444" text-anchor="middle">VENDOR APP</text>

  <!-- Arrow -->
  <path d="M 580,390 L 700,390" stroke="#f5450a" stroke-width="2" opacity="0.5" marker-end="url(#arr)"/>
  <polygon points="692,384 708,390 692,396" fill="#f5450a" opacity="0.6"/>

  <!-- ── LEFT PHONE: Consumer app navigating ── -->
  <rect x="136" y="76" width="248" height="548" rx="40" fill="#1c1c1e"/>
  <rect x="136" y="76" width="248" height="548" rx="40" fill="none" stroke="#2e2e30" stroke-width="1.5"/>
  <rect x="92" y="210" width="4" height="60" rx="2" fill="#2a2a2c"/>
  <rect x="92" y="284" width="4" height="40" rx="2" fill="#2a2a2c"/>
  <rect x="384" y="228" width="4" height="72" rx="2" fill="#2a2a2c"/>
  <rect x="144" y="84" width="232" height="532" rx="30" fill="#111111"/>

  <g clip-path="url(#lp1)">

    <!-- Map navigation view (zoomed in) -->
    <rect x="142" y="82" width="236" height="516" fill="#1b1d29"/>

    <!-- Zoomed streets -->
    <rect x="142" y="190" width="236" height="12" fill="#2d3045"/>
    <text x="170" y="199" font-size="7" fill="#6668a0">GULBERG MAIN BLVD</text>
    <rect x="142" y="330" width="236" height="10" fill="#2d3045"/>
    <text x="170" y="338" font-size="7" fill="#6668a0">LIBERTY MARKET ROAD</text>
    <rect x="240" y="82" width="10" height="516" fill="#2d3045"/>
    <line x1="142" y1="260" x2="378" y2="260" stroke="#252838" stroke-width="2"/>
    <line x1="142" y1="390" x2="378" y2="390" stroke="#252838" stroke-width="2"/>
    <line x1="180" y1="82" x2="180" y2="598" stroke="#252838" stroke-width="2"/>
    <line x1="310" y1="82" x2="310" y2="598" stroke="#252838" stroke-width="2"/>
    <line x1="342" y1="82" x2="342" y2="598" stroke="#252838" stroke-width="2"/>

    <!-- Building blocks -->
    <rect x="148" y="204" width="88" height="52" fill="#21222e" rx="2"/>
    <rect x="148" y="272" width="60" height="54" fill="#21222e" rx="2"/>
    <rect x="256" y="204" width="80" height="52" fill="#21222e" rx="2"/>
    <rect x="256" y="272" width="80" height="54" fill="#21222e" rx="2"/>
    <rect x="148" y="344" width="88" height="42" fill="#1e2828" rx="2"/>
    <rect x="256" y="344" width="80" height="42" fill="#21222e" rx="2"/>

    <!-- Navigation route (blue dashed line) -->
    <polyline points="200,480 200,340 250,340 250,260 260,200" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>

    <!-- User location (moving - at bottom of route) -->
    <circle cx="200" cy="480" r="24" fill="#3b82f6" opacity="0.2"/>
    <circle cx="200" cy="480" r="14" fill="#3b82f6" opacity="0.25"/>
    <circle cx="200" cy="480" r="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="200" cy="480" r="3" fill="#3b82f6"/>
    <!-- Direction arrow on user dot -->
    <polygon points="200,466 194,478 206,478" fill="#3b82f6" opacity="0.7"/>

    <!-- Destination pin: Khan's (at top of route) - large, pulsing -->
    <circle cx="260" cy="196" r="36" fill="url(#alertGlow2)"/>
    <circle cx="260" cy="196" r="22" fill="url(#alertGlow)"/>
    <path d="M260,170 m-14,0 a14,14 0 1 1 28,0 a14,14 0 0 1 -28,0 L260,198 Z" fill="#f5450a"/>
    <text x="260" y="184" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">K</text>

    <!-- Distance badge -->
    <rect x="218" y="418" width="76" height="26" rx="13" fill="#f5450a"/>
    <text x="256" y="435" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">89m away</text>

    <!-- Status bar -->
    <rect x="142" y="82" width="236" height="44" fill="#111111"/>
    <text x="158" y="107" font-size="11" font-weight="600" fill="#ffffff">9:41</text>
    <rect x="214" y="89" width="84" height="24" rx="12" fill="#000000"/>
    <rect x="327" y="94" width="14" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="341" y="97" width="2" height="6" rx="1" fill="#ffffff"/>
    <rect x="329" y="96" width="10" height="8" rx="1" fill="#ffffff"/>
    <rect x="310" y="96" width="3" height="10" rx="1" fill="#ffffff"/>
    <rect x="306" y="98" width="2" height="8" rx="1" fill="#ffffff"/>
    <rect x="302" y="100" width="2" height="6" rx="1" fill="#ffffff"/>

    <!-- Navigation header -->
    <rect x="142" y="126" width="236" height="54" fill="#111111" opacity="0.9"/>
    <text x="162" y="148" font-size="12" font-weight="700" fill="#f5450a">Navigating to:</text>
    <text x="162" y="166" font-size="11" fill="#ffffff">Khan's Food Corner</text>
    <text x="278" y="166" font-size="11" fill="#f5450a" text-anchor="end">89m ↑</text>

    <!-- Bottom nav bar -->
    <rect x="142" y="548" width="236" height="50" fill="#111111"/>
    <text x="175" y="570" font-size="20" text-anchor="middle">🗺</text>
    <text x="175" y="585" font-size="9" fill="#707070" text-anchor="middle">Map</text>
    <text x="220" y="570" font-size="20" text-anchor="middle">🔍</text>
    <text x="220" y="585" font-size="9" fill="#707070" text-anchor="middle">Discover</text>
    <text x="265" y="570" font-size="20" text-anchor="middle">🔖</text>
    <text x="265" y="585" font-size="9" fill="#707070" text-anchor="middle">Saved</text>
    <text x="310" y="570" font-size="20" text-anchor="middle">👤</text>
    <text x="310" y="585" font-size="9" fill="#707070" text-anchor="middle">Me</text>

  </g>
  <rect x="228" y="610" width="48" height="4" rx="2" fill="#333336"/>

  <!-- Label below left phone -->
  <text x="260" y="648" font-size="12" fill="#707070" text-anchor="middle">Consumer App</text>
  <text x="260" y="664" font-size="11" fill="#444444" text-anchor="middle">User navigating to business</text>

  <!-- ── RIGHT PHONE: Vendor alert ── -->
  <!-- Alert glow behind phone -->
  <circle cx="1020" cy="340" r="220" fill="#f5450a" opacity="0.06"/>
  <circle cx="1020" cy="340" r="140" fill="#f5450a" opacity="0.05"/>

  <rect x="898" y="76" width="248" height="548" rx="40" fill="#1c1c1e"/>
  <rect x="898" y="76" width="248" height="548" rx="40" fill="none" stroke="#2e2e30" stroke-width="1.5"/>
  <rect x="856" y="210" width="4" height="60" rx="2" fill="#2a2a2c"/>
  <rect x="1144" y="228" width="4" height="72" rx="2" fill="#2a2a2c"/>
  <rect x="906" y="84" width="232" height="532" rx="30" fill="#0a0a0a"/>

  <g clip-path="url(#lp2)">

    <!-- Full screen alert background - dark with orange glow -->
    <rect x="902" y="82" width="236" height="516" fill="#0d0000"/>
    <!-- Concentric rings (proximity animation) -->
    <circle cx="1020" cy="300" r="180" fill="none" stroke="#f5450a" stroke-width="1" opacity="0.08"/>
    <circle cx="1020" cy="300" r="140" fill="none" stroke="#f5450a" stroke-width="1.5" opacity="0.14"/>
    <circle cx="1020" cy="300" r="100" fill="none" stroke="#f5450a" stroke-width="2" opacity="0.22"/>
    <circle cx="1020" cy="300" r="68" fill="none" stroke="#f5450a" stroke-width="2.5" opacity="0.35"/>
    <circle cx="1020" cy="300" r="40" fill="#f5450a" opacity="0.15"/>
    <circle cx="1020" cy="300" r="24" fill="#f5450a" opacity="0.3"/>

    <!-- Central icon -->
    <circle cx="1020" cy="300" r="20" fill="#f5450a"/>
    <text x="1020" y="308" font-size="18" fill="#fff" text-anchor="middle">👤</text>

    <!-- Distance text -->
    <text x="1020" y="344" font-size="24" font-weight="800" fill="#f5450a" text-anchor="middle">89m</text>
    <text x="1020" y="362" font-size="11" fill="#a05030" text-anchor="middle">and closing</text>

    <!-- Status bar -->
    <rect x="902" y="82" width="236" height="44" fill="#0d0000"/>
    <text x="918" y="107" font-size="11" font-weight="600" fill="#ffffff">9:41</text>
    <rect x="976" y="89" width="84" height="24" rx="12" fill="#000000"/>
    <rect x="1089" y="94" width="14" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="1103" y="97" width="2" height="6" rx="1" fill="#ffffff"/>
    <rect x="1091" y="96" width="10" height="8" rx="1" fill="#ffffff"/>
    <rect x="1072" y="96" width="3" height="10" rx="1" fill="#f5450a"/>
    <rect x="1068" y="98" width="2" height="8" rx="1" fill="#f5450a"/>
    <rect x="1064" y="100" width="2" height="6" rx="1" fill="#f5450a"/>

    <!-- Alert header -->
    <text x="1020" y="126" font-size="10" fill="#f5450a" text-anchor="middle" letter-spacing="2" font-weight="700">⚡  CUSTOMER INCOMING</text>

    <!-- Business name -->
    <text x="1020" y="152" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Khan's Food Corner</text>
    <text x="1020" y="170" font-size="11" fill="#707070" text-anchor="middle">Via lokal app · Gulberg III</text>

    <!-- ETA + action bar at bottom -->
    <rect x="902" y="440" width="236" height="158" fill="#0d0000"/>
    <rect x="902" y="440" width="236" height="1" fill="#2a1500"/>

    <text x="1020" y="462" font-size="11" fill="#707070" text-anchor="middle">Customer found you through lokal</text>

    <rect x="918" y="472" width="204" height="48" rx="12" fill="#1a0800" stroke="#f5450a" stroke-width="1.5"/>
    <text x="1020" y="492" font-size="12" font-weight="700" fill="#f5450a" text-anchor="middle">⏱  ETA: approx. 1 minute</text>
    <text x="1020" y="510" font-size="10" fill="#804020" text-anchor="middle">Based on current speed &amp; distance</text>

    <rect x="918" y="530" width="204" height="36" rx="10" fill="#f5450a"/>
    <text x="1020" y="552" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="600">I'm Ready — Open Up! ✓</text>

    <text x="1020" y="582" font-size="10" fill="#444444" text-anchor="middle">Dismiss</text>

  </g>
  <rect x="990" y="610" width="60" height="4" rx="2" fill="#2a1500"/>

  <!-- Label below right phone -->
  <text x="1020" y="648" font-size="12" fill="#707070" text-anchor="middle">Vendor App</text>
  <text x="1020" y="664" font-size="11" fill="#444444" text-anchor="middle">Real-time proximity ping</text>

  <!-- Center headline -->
  <text x="640" y="150" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">The mechanic that closed the round</text>
  <text x="640" y="174" font-size="13" fill="#707070" text-anchor="middle">When a user navigates to a vendor and hits 100m — the vendor gets a real-time ping.</text>
  <text x="640" y="192" font-size="13" fill="#707070" text-anchor="middle">The first proof of app-driven foot traffic for informal businesses.</text>

  </g>
</svg>
