  <rect x="30" y="238" width="330" height="22" fill="#0d0d0d"/>
  <text x="50" y="244" font-size="12" font-weight="600" fill="#ffffff">Event Summary</text>
  <line x1="30" y1="260" x2="360" y2="260" stroke="#1a1a1a" stroke-width="1"/>

  <text x="50" y="286" font-size="10" fill="#555" letter-spacing="1">CIRCUIT</text>
  <text x="50" y="304" font-size="13" font-weight="600" fill="#ffffff">Road America</text>
  <text x="50" y="320" font-size="11" fill="#666">4.048 mi · 14 turns · Elkhart Lake, WI</text>

  <line x1="50" y1="336" x2="340" y2="336" stroke="#1a1a1a" stroke-width="1"/>

  <text x="50" y="356" font-size="10" fill="#555" letter-spacing="1">EVENT DATE</text>
  <text x="50" y="374" font-size="13" font-weight="600" fill="#ffffff">Saturday, May 3, 2026</text>
  <text x="50" y="390" font-size="11" fill="#666">Gates open 6:30 AM · First session 8:00 AM</text>

  <line x1="50" y1="406" x2="340" y2="406" stroke="#1a1a1a" stroke-width="1"/>

  <text x="50" y="426" font-size="10" fill="#555" letter-spacing="1">RUN GROUPS</text>
