  <rect x="398" y="478" width="320" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="418" y="501" font-size="12" fill="#aaa">GT4 — Class 5 (Street Prepared)</text>
  <text x="704" y="501" font-size="11" fill="#333">▾</text>

  <text x="740" y="472" font-size="11" fill="#888">Run Group</text>
  <!-- Run group chips -->
  <rect x="740" y="478" width="84" height="36" rx="5" fill="#1a0000" stroke="#CF2027" stroke-width="1.5"/>
  <text x="782" y="500" font-size="12" fill="#CF2027" text-anchor="middle" font-weight="600">Advanced</text>
  <rect x="836" y="478" width="110" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="891" y="500" font-size="12" fill="#555" text-anchor="middle">Intermediate</text>
  <rect x="958" y="478" width="72" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="994" y="500" font-size="12" fill="#555" text-anchor="middle">Novice</text>

  <!-- Row 3: Safety equipment -->
  <text x="398" y="536" font-size="12" font-weight="600" fill="#ffffff">Safety Equipment</text>

  <rect x="398" y="548" width="20" height="20" rx="4" fill="#CF2027"/>
  <text x="408" y="562" font-size="10" fill="#fff" text-anchor="middle">✓</text>
  <text x="426" y="562" font-size="12" fill="#aaa">Helmet — Snell SA2020 certified</text>

  <rect x="398" y="576" width="20" height="20" rx="4" fill="#CF2027"/>
  <text x="408" y="590" font-size="10" fill="#fff" text-anchor="middle">✓</text>
  <text x="426" y="590" font-size="12" fill="#aaa">Hans Device / Dhans</text>

  <rect x="398" y="604" width="20" height="20" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="426" y="618" font-size="12" fill="#555">Fire extinguisher (required for Advanced)</text>
  <rect x="730" y="604" width="130" height="20" rx="4" fill="#CF2027" opacity="0.15" stroke="#CF2027" stroke-width="0.8"/>
  <text x="795" y="618" font-size="10" fill="#CF2027" text-anchor="middle">Required ⚠</text>

  <!-- Tech inspection note -->
  <rect x="398" y="632" width="836" height="32" rx="5" fill="#1a0a00" stroke="#CF2027" stroke-width="0.8" opacity="0.8"/>
  <text x="418" y="652" font-size="11" fill="#CF2027">⚑  Tech inspection slot auto-booked: Sat 7:00–7:45 AM. Bring car and logbook.</text>

  <!-- Bottom action bar -->
  <rect x="378" y="666" width="876" height="38" rx="8" fill="#0d0d0d"/>
  <rect x="378" y="666" width="876" height="10" fill="#0d0d0d"/>
  <text x="400" y="690" font-size="11" fill="#555">← Back to Driver Info</text>
  <rect x="1090" y="671" width="148" height="28" rx="5" fill="url(#redBtnR)"/>
  <text x="1164" y="689" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Continue →</text>
  <text x="800" y="690" font-size="11" fill="#444" text-anchor="middle">Progress saved automatically</text>

  </g>
