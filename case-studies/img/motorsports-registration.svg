  <text x="76" y="86" font-size="11" fill="#444"> / </text>
  <text x="88" y="86" font-size="11" fill="#555">Time Trial</text>
  <text x="136" y="86" font-size="11" fill="#444"> / </text>
  <text x="148" y="86" font-size="11" fill="#CF2027">Spring Time Trial — Road America</text>
  <!-- Event title -->
  <text x="40" y="124" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Spring Time Trial — Road America</text>
  <!-- Meta -->
  <text x="40" y="152" font-size="12" fill="#888">📅  May 3, 2026</text>
  <text x="148" y="152" font-size="12" fill="#888">📍  Elkhart Lake, WI</text>
  <text x="276" y="152" font-size="12" fill="#888">🏎  Time Trial · 4 Run Groups</text>
  <text x="450" y="152" font-size="12" fill="#888">👥  312 registered · 48 spots left</text>
  <rect x="680" y="138" width="82" height="24" rx="5" fill="#CF2027" opacity="0.2" stroke="#CF2027" stroke-width="1"/>
  <text x="721" y="154" font-size="10" fill="#CF2027" text-anchor="middle" font-weight="600">● Open</text>

