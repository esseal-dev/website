  <rect x="398" y="410" width="120" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="418" y="433" font-size="12" fill="#aaa">2019</text>

  <text x="534" y="404" font-size="11" fill="#888">Make</text>
  <rect x="534" y="410" width="160" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="554" y="433" font-size="12" fill="#aaa">Porsche</text>

  <text x="710" y="404" font-size="11" fill="#888">Model</text>
  <rect x="710" y="410" width="200" height="36" rx="5" fill="#0d0d0d" stroke="#CF2027" stroke-width="1.5"/>
  <text x="730" y="433" font-size="12" fill="#ffffff">Cayman GT4</text>

  <text x="926" y="404" font-size="11" fill="#888">Color</text>
  <rect x="926" y="410" width="140" height="36" rx="5" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="946" y="433" font-size="12" fill="#aaa">Guards Red</text>
  <rect x="1082" y="422" width="16" height="16" rx="3" fill="#CF2027"/>

