<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <clipPath id="mra"><rect width="1280" height="720"/></clipPath>
    <linearGradient id="regHero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="redBtnR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CF2027"/>
      <stop offset="100%" stop-color="#e02830"/>
    </linearGradient>
    <linearGradient id="progressFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CF2027"/>
      <stop offset="100%" stop-color="#e02830"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#mra)">

  <!-- Background -->
  <rect width="1280" height="720" fill="#0d0d0d"/>

  <!-- ── TOP SITE HEADER ── -->
  <rect x="0" y="0" width="1280" height="52" fill="#080808" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="16" y="14" width="24" height="24" rx="4" fill="#CF2027"/>
  <text x="28" y="30" font-size="11" font-weight="800" fill="#fff" text-anchor="middle">⚑</text>
  <text x="50" y="24" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="1">MOTORSPORTS</text>
  <text x="50" y="40" font-size="9" fill="#555" letter-spacing="2">MEMBER PORTAL</text>
  <text x="500" y="30" font-size="12" fill="#888">Events</text>
  <text x="562" y="30" font-size="12" fill="#888">Results</text>
  <text x="630" y="30" font-size="12" fill="#888">My Registrations</text>
  <text x="762" y="30" font-size="12" fill="#888">Timing</text>
  <text x="824" y="30" font-size="12" fill="#888">Safety</text>
  <text x="880" y="30" font-size="12" fill="#888">About</text>
  <rect x="1100" y="12" width="136" height="28" rx="5" fill="url(#redBtnR)"/>
  <text x="1168" y="30" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">My Account</text>
  <text x="1252" y="30" font-size="16">🛒</text>

  <!-- ── EVENT HERO BANNER ── -->
  <rect x="0" y="52" width="1280" height="148" fill="url(#regHero)"/>
  <!-- Track graphic suggestion -->
  <path d="M800,52 Q900,80 980,120 Q1060,160 1150,148 L1280,148 L1280,52 Z" fill="#CF2027" opacity="0.08"/>
  <path d="M860,52 Q960,90 1040,130 Q1120,165 1200,200 L1280,200 L1280,52 Z" fill="#CF2027" opacity="0.05"/>
  <!-- Checkered flag strip -->
  <rect x="0" y="52" width="1280" height="8" fill="#0d0d0d"/>
  <rect x="0" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="40" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="80" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="120" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="160" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="200" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="240" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="280" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="320" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="360" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="400" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="440" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="480" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="520" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="560" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="600" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="640" y="52" width="20" height="8" fill="#ffffff"/>
  <rect x="680" y="52" width="20" height="8" fill="#ffffff"/>
