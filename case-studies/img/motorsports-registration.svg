  <rect x="378" y="258" width="876" height="4" fill="#1a1a1a"/>
  <rect x="378" y="258" width="584" height="4" fill="url(#progressFill)"/>
  <!-- Step indicators -->
  <circle cx="562" cy="260" r="8" fill="#CF2027"/>
  <text x="562" y="264" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">✓</text>
