  <circle cx="962" cy="260" r="8" fill="#CF2027" stroke="#CF2027" stroke-width="2"/>
  <text x="962" y="264" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="962" y="280" font-size="9" fill="#CF2027" text-anchor="middle">Vehicle</text>
  <circle cx="1180" cy="260" r="8" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="1180" y="264" font-size="8" fill="#555" text-anchor="middle">3</text>
  <text x="1180" y="280" font-size="9" fill="#444" text-anchor="middle">Add-ons</text>

  <!-- Driver info summary (completed step) -->
  <rect x="398" y="290" width="836" height="60" rx="6" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  <text x="418" y="312" font-size="10" fill="#555" letter-spacing="1">DRIVER — STEP 1 COMPLETE</text>
  <text x="418" y="332" font-size="12" fill="#888">Michael R. Castellano  ·  SCCA# 287441  ·  License: Club Racing — Full  ·  Member since 2018</text>
  <text x="1210" y="322" font-size="11" fill="#CF2027" text-anchor="end">Edit ✎</text>

  <!-- Vehicle form section -->
