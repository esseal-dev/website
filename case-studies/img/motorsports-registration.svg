  <text x="86" y="449" font-size="10" fill="#CF2027" text-anchor="middle">Novice</text>
  <rect x="132" y="434" width="90" height="22" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="177" y="449" font-size="10" fill="#888" text-anchor="middle">Intermediate</text>
  <rect x="232" y="434" width="72" height="22" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="268" y="449" font-size="10" fill="#888" text-anchor="middle">Advanced</text>
  <rect x="50" y="462" width="86" height="22" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="93" y="477" font-size="10" fill="#888" text-anchor="middle">Instructor</text>

  <line x1="50" y1="494" x2="340" y2="494" stroke="#1a1a1a" stroke-width="1"/>

  <text x="50" y="514" font-size="10" fill="#555" letter-spacing="1">PRICING</text>
  <text x="50" y="534" font-size="12" fill="#aaa">Entry fee (solo)</text>
  <text x="340" y="534" font-size="12" fill="#ffffff" text-anchor="end">$325.00</text>
  <text x="50" y="554" font-size="12" fill="#aaa">Timing transponder rental</text>
  <text x="340" y="554" font-size="12" fill="#888" text-anchor="end">+ $40.00</text>
  <text x="50" y="574" font-size="12" fill="#aaa">Tech inspection slot</text>
