  <text x="320" y="136" font-size="11" fill="#374151" font-weight="600" text-anchor="middle">NEC4 ENGINEERING AND CONSTRUCTION CONTRACT</text>
  <text x="320" y="152" font-size="10" fill="#6b7280" text-anchor="middle">Birmingham HS2 Interchange Hub — Civils Package A</text>
  <line x1="264" y1="162" x2="844" y2="162" stroke="#e5e7eb" stroke-width="1"/>

  <text x="264" y="182" font-size="11" fill="#374151" font-weight="700">Clause 60 — Compensation Events</text>
  <text x="264" y="200" font-size="10" fill="#374151">60.1  The following are compensation events:</text>

  <!-- Normal text lines -->
  <text x="278" y="218" font-size="9.5" fill="#374151">(1)  The Project Manager gives an instruction changing the Scope.</text>
  <text x="278" y="234" font-size="9.5" fill="#374151">(2)  The Employer does not allow access to and use of a part of the Site by the later of the access date</text>
  <text x="286" y="248" font-size="9.5" fill="#374151">     and the date shown on the Accepted Programme.</text>
  <text x="278" y="264" font-size="9.5" fill="#374151">(3)  The Employer does not provide something which it is to provide by the date for providing it</text>
  <text x="286" y="278" font-size="9.5" fill="#374151">     shown on the Accepted Programme.</text>

  <!-- Highlighted clause (AI flagged) -->
  <rect x="264" y="290" width="580" height="52" rx="3" fill="#fef3c7" opacity="0.6"/>
  <rect x="264" y="290" width="3" height="52" fill="#f59e0b"/>
  <text x="278" y="306" font-size="9.5" fill="#374151" font-weight="500">(4)  The Project Manager gives an instruction to stop or not to start any work or to change a Key Date.</text>
  <text x="278" y="320" font-size="9.5" fill="#374151">     The Contractor notifies the Project Manager within eight weeks of becoming aware of the event,</text>
  <text x="278" y="334" font-size="9.5" fill="#374151">     otherwise the Contractor is not entitled to a compensation event.</text>

  <text x="278" y="358" font-size="9.5" fill="#374151">(5)  The Employer or Others do not work within the times shown on the Accepted Programme.</text>
  <text x="278" y="374" font-size="9.5" fill="#374151">(6)  The Employer or Others do not work within the conditions stated in the Scope.</text>

  <!-- Highlighted clause (AI flagged — risk) -->
  <rect x="264" y="386" width="580" height="52" rx="3" fill="#fee2e2" opacity="0.5"/>
  <rect x="264" y="386" width="3" height="52" fill="#ef4444"/>
  <text x="278" y="402" font-size="9.5" fill="#374151" font-weight="500">(7)  A weather measurement is recorded within a calendar month before the Completion Date which is</text>
  <text x="278" y="416" font-size="9.5" fill="#374151">     more extreme than the weather which is shown in the Weather Data as occurring on average less</text>
  <text x="278" y="430" font-size="9.5" fill="#374151">     than once in ten years.</text>

  <text x="278" y="450" font-size="9.5" fill="#374151">(8)  The Project Manager corrects an assumption which it stated about a Compensation Event.</text>
  <text x="278" y="466" font-size="9.5" fill="#374151">(9)  An event which stops the Contractor completing the whole of the works or stops the Contractor</text>
  <text x="278" y="480" font-size="9.5" fill="#374151">     completing the whole of the works by the date shown on the Accepted Programme and which</text>
  <text x="278" y="494" font-size="9.5" fill="#374151">     neither Party could prevent and an experienced contractor would have judged at the Contract</text>
  <text x="278" y="508" font-size="9.5" fill="#374151">     Date to have such a small chance of occurring that it would have been unreasonable to allow</text>
  <text x="278" y="522" font-size="9.5" fill="#374151">     for it.</text>

  <text x="264" y="545" font-size="11" fill="#374151" font-weight="700">Clause 61 — Notifying Compensation Events</text>
  <text x="264" y="563" font-size="10" fill="#374151">61.1  For compensation events which arise from the Project Manager or the Supervisor giving an</text>
  <text x="272" y="577" font-size="10" fill="#374151">       instruction or changing an earlier decision, the Project Manager notifies the Contractor of</text>
  <text x="272" y="591" font-size="10" fill="#374151">       the compensation event at the time of the instruction.</text>

