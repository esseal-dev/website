  <line x1="860" y1="340" x2="1180" y2="340" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <line x1="860" y1="420" x2="1180" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1" />

