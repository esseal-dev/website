  <text x="992" y="544" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(250,98,32,0.8)" text-anchor="middle" letter-spacing="0.3">7 Years · 38 Projects</text>
